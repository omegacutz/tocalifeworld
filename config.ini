[meta]
# Config-first tuning for the game.
# Edit values here to change behavior without modifying engine/model code.

[display]
# Tile and screen layout settings.
# SCREEN_W = grid_w * tile_size
# SCREEN_H = hud_height + (grid_h * tile_size)
tile_size = 28
grid_w = 36
grid_h = 24
hud_height = 140

# Render/update cadence.
fps = 60

# HUD and window text style.
font_name = consolas
font_size = 18
game_title = Matthew's Mini Town - A to B

# Save file name for best score persistence.
high_score_file = high_score.json

# HUD text color as RGB: r,g,b
text_color = 24,24,24

# Right-side HUD status layout (version + win line).
# Labels are right-aligned using this margin from the right edge.
hud_right_margin_px = 12
# Vertical row for "Version" text.
hud_version_row_y = 36
# Vertical row for win/finish status text.
hud_win_row_y = 58

[generation]
# Procedural map generation probabilities.
# 0.0 = never, 1.0 = always
building_chance = 0.38
tree_chance = 0.30

[gameplay]
# Initial slider defaults at startup.
# Runtime slider movement can still override these while playing.
initial_difficulty = 55
initial_wind_speed = 35

# Scoring and combo rules.
collectible_points = 10
combo_window_seconds = 10
combo_multiplier_cap = 5
finish_time_target_seconds = 120
finish_bonus_points = 100

[movement]
# Smooth motion: number of interpolation steps per tile movement.
# Higher = smoother/softer, lower = snappier/faster.
sub_tile_steps = 10

# NPC movement behavior tuning.
npc_move_interval_ms = 420
npc_move_chance = 0.65

# Avatar movement behavior tuning.
avatar_idle_interval_ms = 280
avatar_contact_slowdown_ms = 120
